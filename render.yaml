services:
  - type: worker
    name: Dex
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python Dex.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: ADMIN_IDS
        sync: false
    disk:
      name: dex-storage
      mountPath: /data
      sizeGB: 1
